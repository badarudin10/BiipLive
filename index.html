<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiipLifeStory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="hero-login">
        <div class="glass-card">
            <h1 class="brand-title">BiipLifeStory</h1>
            <input type="text" id="user" placeholder="Nama Penulis" class="input-field">
            <input type="password" id="pass" placeholder="Kunci Rahasia" class="input-field">
            <button onclick="masuk()" class="btn-primary">Buka Lembaran Baru</button>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden dashboard">
        <h2 style="font-family:'Playfair Display'; font-size:1.8rem; margin-bottom:20px;">Pilih Kanvas Jiwamu</h2>
        <div class="theme-grid">
            <div class="card botanical" onclick="pilih('Botanical')">🌿 Botanical</div>
            <div class="card celestial" onclick="pilih('Celestial')">✨ Celestial</div>
            <div class="card archive" onclick="pilih('Archive')">📜 Archive</div>
            <div class="card watercolor" onclick="pilih('Watercolor')">🎨 Watercolor</div>
        </div>
    </div>

    <script>
        function masuk() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u && p) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
            } else {
                alert("Mohon masukkan Nama & Sandi.");
            }
        }
        function pilih(tema) {
            localStorage.setItem('temaAktif', tema);
            window.location.href = 'tulis.html';
        }
    </script>
</body>
</html>
