<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiipLifeStory Professional Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="ornament-layer">
        <div id="orn-left" class="ornament"></div>
        <div id="orn-right" class="ornament"></div>
    </div>

    <div id="section-auth" style="height:100vh; display:flex; align-items:center; justify-content:center;">
        <div style="background:white; padding:50px; border-radius:30px; box-shadow:0 20px 40px rgba(0,0,0,0.05); text-align:center; width:400px;">
            <h1 style="font-family:'Crimson Pro'; font-size:3rem; margin-bottom:20px;">BiipLifeStory</h1>
            <input type="text" id="username" placeholder="Identitas Penulis" style="width:100%; padding:15px; border-radius:15px; border:1.5px solid #eee; margin-bottom:20px;">
            <button onclick="doLogin()" class="btn-dock" style="background:#1a1a1a; color:white; width:100%;">Masuk Ruang Ide</button>
        </div>
    </div>

    <div id="section-dash" class="hidden" style="max-width:900px; margin:auto; padding:60px 20px;">
        <h2 style="font-family:'Crimson Pro'; font-size:2.5rem; margin-bottom:40px;">Karya Anda, <span id="user-tag"></span></h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:25px;">
            <div onclick="initEditor('botanical')" style="height:200px; border-radius:30px; background:#2d5a27; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center;"><h3>Botanical</h3></div>
            <div onclick="initEditor('celestial')" style="height:200px; border-radius:30px; background:#1a237e; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center;"><h3>Celestial</h3></div>
        </div>
    </div>

    <div id="section-write" class="hidden write-view">
        <div id="capture-area" class="paper-inner">
            <input type="text" id="title" class="editor-title" placeholder="Judul Mahakarya...">
            <textarea id="content" class="editor-body" placeholder="Mulailah mengukir kata..."></textarea>
        </div>

        <div class="dock">
            <button onclick="saveLocal()" class="btn-dock" style="background:#1a1a1a; color:white;">Simpan</button>
            <button onclick="generatePDF()" class="btn-dock" style="background:#ad1457; color:white;">Cetak PDF</button>
            <button onclick="shareViaWA()" class="btn-dock" style="background:#25d366; color:white;">Kirim PDF ke WA</button>
            <button onclick="exitToDash()" class="btn-dock" style="background:transparent; border:1px solid #ccc;">Kembali</button>
        </div>
    </div>

    <script>
        function doLogin() {
            const u = document.getElementById('username').value;
            if(u) {
                localStorage.setItem('active_author', u);
                document.getElementById('user-tag').innerText = u;
                switchSection('section-dash');
            }
        }

        function switchSection(id) {
            document.querySelectorAll('body > div:not(.ornament-layer)').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function initEditor(vibe) {
            switchSection('section-write');
            const left = document.getElementById('orn-left');
            const right = document.getElementById('orn-right');
            
            // ASSETS VISUAL (Elemen di sisi kertas)
            const assets = {
                'botanical': 'url("https://www.transparentpng.com/download/leaves/green-leaves-png-images-12.png")',
                'celestial': 'url("https://www.transparentpng.com/download/star/gold-star-transparent-background-21.png")'
            };
            left.style.backgroundImage = assets[vibe];
            right.style.backgroundImage = assets[vibe];
            
            document.getElementById('title').value = "";
            document.getElementById('content').value = "";
        }

        function generatePDF() {
            const element = document.getElementById('capture-area');
            const filename = (document.getElementById('title').value || 'Karya') + '.pdf';
            const opt = {
                margin: 0.5,
                filename: filename,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function shareViaWA() {
            const title = document.getElementById('title').value || "Karya";
            alert("Harap unduh PDF terlebih dahulu melalui tombol 'Cetak PDF', lalu lampirkan ke WhatsApp. Ini adalah prosedur keamanan browser untuk menjamin file terkirim dengan utuh.");
            window.open(`https://wa.me/?text=Halo, berikut naskah saya yang berjudul: ${title}`, '_blank');
        }

        function exitToDash() {
            document.getElementById('orn-left').style.backgroundImage = 'none';
            document.getElementById('orn-right').style.backgroundImage = 'none';
            switchSection('section-dash');
        }
    </script>
</body>
</html>
