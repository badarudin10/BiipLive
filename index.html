<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiipLifeStory - Bagikan Kisahmu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <section id="landing-page" class="hero-section">
        <div class="hero-overlay">
            <h1 class="animate-pop">BiipLifeStory</h1>
            <p>Setiap hari adalah lembaran baru. Tuliskan kisahmu dengan indah.</p>
            <div class="btn-group">
                <button class="btn-main" onclick="showDashboard()">Mulai Menulis</button>
                <button class="btn-sec" onclick="window.location.href='login.html'">Masuk Akun</button>
            </div>
        </div>
    </section>

    <section id="dashboard-themes" class="container" style="display:none;">
        <h2 class="title-center">Pilih Suasana Menulismu</h2>
        <div class="theme-grid">
            <div class="card-theme nature" onclick="goToWrite('Nature')">
                <span class="emoji">🌿</span>
                <h3>Nature</h3>
                <p>Hijau menenangkan</p>
            </div>
            <div class="card-theme sunset" onclick="goToWrite('Sunset')">
                <span class="emoji">🌅</span>
                <h3>Sunset</h3>
                <p>Hangat & Romantis</p>
            </div>
            <div class="card-theme ocean" onclick="goToWrite('Ocean')">
                <span class="emoji">🌊</span>
                <h3>Ocean</h3>
                <p>Tenang & Luas</p>
            </div>
        </div>
    </section>

    <script>
        function showDashboard() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('dashboard-themes').style.display = 'block';
        }

        function goToWrite(theme) {
            localStorage.setItem('selectedTheme', theme);
            window.location.href = 'tulis.html';
        }
    </script>
</body>
</html>
