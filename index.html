<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiipLifeStory Professional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="ornament-bg">
        <div id="orn-L" class="orn-side"></div>
        <div id="orn-R" class="orn-side"></div>
    </div>

    <div id="page-auth" style="height:100vh; display:flex; align-items:center; justify-content:center;">
        <div style="background:white; padding:50px; border-radius:45px; text-align:center; box-shadow:0 30px 70px rgba(0,0,0,0.05); width:420px;">
            <h1 style="font-family:'Crimson Pro'; font-size:3.5rem; margin-bottom:25px;">BiipLife</h1>
            <input type="text" id="in-user" placeholder="Nama Penulis..." style="width:100%; padding:18px; border-radius:20px; border:1px solid #eee; margin-bottom:20px; font-size:1rem; outline:none;">
            <button onclick="handleLogin()" class="btn-ui" style="background:#1a1a1a; color:white; width:100%; padding:18px;">Buka Gerbang Ide</button>
        </div>
    </div>

    <div id="page-dash" class="hidden dash-container">
        <h2 style="font-family:'Crimson Pro'; font-size:2.8rem; margin-bottom:40px;">Mahakarya Anda, <span id="span-user"></span></h2>
        
        <div class="grid-themes">
            <div class="theme-box botanical" onclick="bukaKertas('botanical')"><h3>Botanical</h3><p>Alam & Kebijaksanaan</p></div>
            <div class="theme-box celestial" onclick="bukaKertas('celestial')"><h3>Celestial</h3><p>Bintang & Imajinasi</p></div>
            <div class="theme-box archive" onclick="bukaKertas('archive')"><h3>Archive</h3><p>Sejarah & Keabadian</p></div>
            <div class="theme-box watercolor" onclick="bukaKertas('watercolor')"><h3>Watercolor</h3><p>Seni & Kejujuran</p></div>
        </div>
    </div>

    <div id="page-write" class="hidden writing-area">
        <div id="pdf-content" class="paper-wrapper">
            <input type="text" id="txt-title" class="input-title" placeholder="Judul Mahakarya...">
            <textarea id="txt-body" class="input-body" placeholder="Tuliskan jejak pikiran Anda di sini..."></textarea>
        </div>

        <div class="action-dock">
            <button onclick="exportKePDF()" class="btn-ui" style="background:#ad1457; color:white;">Simpan PDF</button>
            <button onclick="bagikanKeWA()" class="btn-ui" style="background:#25d366; color:white;">Share WA</button>
            <button onclick="window.print()" class="btn-ui">Print</button>
            <button onclick="kembaliDash()" class="btn-ui" style="background:transparent; border:1px solid #ccc;">Kembali</button>
        </div>
    </div>

    <script>
        function handleLogin() {
            const name = document.getElementById('in-user').value;
            if(name) {
                document.getElementById('span-user').innerText = name;
                gantiHalaman('page-dash');
            }
        }

        function gantiHalaman(id) {
            document.querySelectorAll('body > div:not(.ornament-bg)').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function bukaKertas(tema) {
            gantiHalaman('page-write');
            const L = document.getElementById('orn-L');
            const R = document.getElementById('orn-R');
            
            // LINK GAMBAR ORNAMEN (Sisi Kertas)
            const ornamen = {
                'botanical': 'url("https://www.transparentpng.com/download/leaves/green-leaves-png-images-12.png")',
                'celestial': 'url("https://www.transparentpng.com/download/star/gold-star-transparent-background-21.png")',
                'archive': 'url("https://www.transparentpng.com/download/book/old-book-transparent-background-12.png")',
                'watercolor': 'url("https://www.transparentpng.com/download/watercolor/watercolor-splash-transparent-background-5.png")'
            };
            
            L.style.backgroundImage = ornamen[tema] || 'none';
            R.style.backgroundImage = ornamen[tema] || 'none';
            
            document.getElementById('txt-title').value = "";
            document.getElementById('txt-body').value = "";
        }

        function exportKePDF() {
            const element = document.getElementById('pdf-content');
            const filename = (document.getElementById('txt-title').value || 'Mahakarya') + '.pdf';
            const opt = {
                margin: 0.5,
                filename: filename,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function bagikanKeWA() {
            const t = document.getElementById('txt-title').value || "Karya Baru";
            alert("Harap simpan PDF terlebih dahulu, lalu lampirkan filenya ke WhatsApp agar format visualnya tetap sempurna.");
            window.open(`https://wa.me/?text=Halo, silakan baca mahakarya saya yang berjudul: *${t}*`, '_blank');
        }

        function kembaliDash() {
            document.getElementById('orn-L').style.backgroundImage = 'none';
            document.getElementById('orn-R').style.backgroundImage = 'none';
            gantiHalaman('page-dash');
        }
    </script>
</body>
</html>
