<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiipBooks</title>
    <title>Lifestory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-page" class="hero-fade">
        <div class="glass-card">
            <h1 class="brand-title">BiipLifeStory</h1>
            <p style="color:#666; margin-bottom:25px;">Selamat datang, Penulis.</p>
            <input type="text" id="user-input" placeholder="Nama Penulis" class="input-field">
            <input type="password" id="pass-input" placeholder="Kunci Rahasia (Sandi)" class="input-field">
            <button onclick="loginSekarang()" class="btn-primary">Buka Lembaran Baru</button>
        </div>
    </div>

    <div id="dashboard-page" class="hidden container">
        <h2 style="text-align:center; font-family:'Playfair Display'; font-size:1.8rem;">Pilih Kanvas Jiwamu</h2>
        <div class="theme-grid">
            <div class="card botanical" onclick="mulai('Botanical')">🌿 Botanical</div>
            <div class="card celestial" onclick="mulai('Celestial')">✨ Celestial</div>
            <div class="card archive" onclick="mulai('Archive')">📜 Archive</div>
            <div class="card watercolor" onclick="mulai('Watercolor')">🎨 Watercolor</div>
        </div>
    </div>

    <script>
        function loginSekarang() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            
            if(u && p) {
                // Simpan sandi otomatis jika akun baru
                if(!localStorage.getItem('pw_'+u)) localStorage.setItem('pw_'+u, p);
                
                if(p === localStorage.getItem('pw_'+u)) {
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('dashboard-page').classList.remove('hidden');
                } else {
                    alert("Sandi salah untuk akun ini!");
                }
            } else {
                alert("Mohon isi Nama dan Sandi.");
            }
        }

        function mulai(t) {
            localStorage.setItem('temaDipilih', t);
            window.location.href = 'tulis.html';
        }
    </script>
</body>
</html>
