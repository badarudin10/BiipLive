<div id="landing-screen" class="full-bg">
    <div class="welcome-card">
        <h1 class="brand-logo">BiipLifeStory</h1>
        <div class="form-container">
            <input type="text" id="user-input" placeholder="Nama Akun" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
            <input type="password" id="pass-input" placeholder="Sandi" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
            <button onclick="prosesLogin()" style="width:100%; padding:15px; background:#2d5a27; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Masuk</button>
        </div>
    </div>
</div>

<div id="main-dashboard" style="display:none;">
    <h1 class="brand-logo" style="text-align:center;">BiipLifeStory</h1>
    <p style="text-align:center;">Pilih kanvas untuk jiwamu</p>
    <div class="theme-grid">
        <div class="theme-card botanical" onclick="bukaDiary('Botanical')">🌿 Botanical</div>
        <div class="theme-card celestial" onclick="bukaDiary('Celestial')">✨ Celestial</div>
        <div class="theme-card archive" onclick="bukaDiary('Archive')">📜 Archive</div>
        <div class="theme-card watercolor" onclick="bukaDiary('Watercolor')">🎨 Watercolor</div>
    </div>
</div>

<script>
    function prosesLogin() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        
        if(u === "admin" && p === "123") { // Ganti sesuai keinginanmu
            document.getElementById('landing-screen').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'block';
            localStorage.setItem('session', 'active');
        } else {
            alert("Akses Ditolak! Gunakan akun yang benar.");
        }
    }

    function bukaDiary(t) {
        localStorage.setItem('temaDipilih', t);
        window.location.href = 'tulis.html';
    }
</script>
